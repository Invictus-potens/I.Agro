name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 170.254.78.193
          port: 4851
          username: invictus
          key: ${{ secrets.DEPLOY_ACTIONS }}
          script: |
            cd ~/desenvolvimento/faculdade/farmer-s_companion
            git pull origin main
            docker compose up -d --build

      - name: Notify Discord - Success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/1486735502097776685/fNdSBU-GmPCY2wRLqGcprPRyir5HvNih0HxfSJffGjF-dDbJWT08M_KTVOMoHSpMdWri
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"embeds\":[{\"title\":\"✅ Deploy realizado com sucesso\",\"description\":\"O deploy do ${{ github.event.repository.name }} foi concluído com sucesso.\",\"color\":5763719,\"fields\":[{\"name\":\"Branch\",\"value\":\"${{ github.ref_name }}\",\"inline\":true},{\"name\":\"Commit\",\"value\":\"${{ github.sha }}\",\"inline\":false},{\"name\":\"Autor\",\"value\":\"${{ github.actor }}\",\"inline\":true}]}]}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord - Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/1486735502097776685/fNdSBU-GmPCY2wRLqGcprPRyir5HvNih0HxfSJffGjF-dDbJWT08M_KTVOMoHSpMdWri
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"embeds\":[{\"title\":\"❌ Falha no deploy\",\"description\":\"O deploy do ${{ github.event.repository.name }} falhou.\",\"color\":15548997,\"fields\":[{\"name\":\"Branch\",\"value\":\"${{ github.ref_name }}\",\"inline\":true},{\"name\":\"Commit\",\"value\":\"${{ github.sha }}\",\"inline\":false},{\"name\":\"Autor\",\"value\":\"${{ github.actor }}\",\"inline\":true}]}]}" \
            "$DISCORD_WEBHOOK_URL"