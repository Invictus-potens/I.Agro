services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api-proxy
        BACKEND_URL: http://backend:8005
    environment:
      - BACKEND_URL=http://backend:8005
    ports:
      - "3500:8005"
    restart: unless-stopped
    depends_on:
      - backend

  mcp-postgres:
    image: node:20-alpine
    env_file:
      - .env
    command: >
      sh -c "npx -y supergateway --port 8090 --outputTransport streamableHttp
      --stdio 'npx -y @modelcontextprotocol/server-postgres ${DATABASE_URL}'"
    ports:
      - "8090:8090"
    restart: unless-stopped
