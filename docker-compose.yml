services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - .env
    environment:
      MCP_SERVER_URL: http://mcp-postgres:8090
    depends_on:
      mcp-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tool_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api-proxy
        BACKEND_URL: http://backend:8005
    environment:
      - BACKEND_URL=http://backend:8005
    ports:
      - "3500:8005"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - tool_net

  mcp-postgres:
    image: node:20-alpine
    env_file:
      - .env
    command:
      - sh
      - -c
      - |
        if [ -z "$$DATABASE_URL" ]; then echo "DATABASE_URL vazia"; exit 1; fi
        exec npx -y supergateway --port 8090 --outputTransport streamableHttp \
          --stdio "npx -y @modelcontextprotocol/server-postgres@0.6.2 $$DATABASE_URL"
    ports:
      - "8090:8090"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8090/mcp').then(()=>process.exit(0)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 90s
    restart: unless-stopped
    networks:
      - tool_net

networks:
  tool_net:
    external: true
