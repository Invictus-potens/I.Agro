services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api-proxy
        BACKEND_URL: http://backend:8005
    environment:
      - BACKEND_URL=http://backend:8005
    ports:
      - "3500:8005"
    restart: unless-stopped
    depends_on:
      - backend
